name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default; CI only needs to read the repo. The open-turo
# actions check out and run pre-commit / tests with this read-only token.
permissions:
  contents: read

jobs:
  # Runs pre-commit (see .pre-commit-config.yaml) — gofmt, go-vet, golangci-lint,
  # go-mod-tidy, go-build, hadolint, actionlint, commitlint, etc. — installing Go
  # from .go-version via action-setup-tools.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: open-turo/actions-go/lint@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # Runs all go tests with -race + coverage.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: open-turo/actions-go/test@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # Belt-and-suspenders: ensure the production image still builds (hadolint in
  # pre-commit lints the Dockerfile, but doesn't build it).
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t atproto-push-gateway .
