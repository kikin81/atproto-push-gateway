# golangci-lint v2 config. This is a TEMPORARY BASELINE: the default linters
# (errcheck, govet, ineffassign, staticcheck, unused) run on all NEW code, while
# pre-existing findings in the inherited DracoBlue code are grandfathered so CI
# is green on adoption. The grandfathered debt is tracked in bead nubecita-3zgt
# and is being cleared on a Go-equipped machine — remove each exclusion below as
# the underlying code is fixed; the end state is empty exclusions.
version: "2"

linters:
  settings:
    staticcheck:
      checks:
        - all
        # SA1019: deprecated-API usage (secp256k1.S256 in did/resolver.go;
        # google.CredentialsFromJSON in push/fcm.go). Real migrations; deferred
        # to nubecita-3zgt. Re-enable (drop this line) once migrated.
        - "-SA1019"
  exclusions:
    generated: lax
    # Idiomatic, low-value errcheck cases (deferred Close, response Write/Print,
    # etc.) — standard golangci-lint exclusion presets, not debt.
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Test setup intentionally ignores errors (RegisterToken/AddBlock/Close…).
      - path: _test\.go
        linters:
          - errcheck
      # TEMP (nubecita-3zgt): grandfather pre-existing errcheck debt in inherited
      # source files. Remove a path here as its swallowed errors are handled.
      - path: internal/(jetstream/consumer|store/store|push/apns|push/fcm|xrpc/handler|xrpc/blocks|did/resolver|profile/resolver)\.go
        linters:
          - errcheck
