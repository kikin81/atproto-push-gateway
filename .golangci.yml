# golangci-lint v2 config.
#
# Enables govet + errcheck + staticcheck + unused. One narrow grandfathered
# exclusion remains (tracked in bead nubecita-3zgt): SA1019 on secp256k1.S256
# in internal/did/resolver.go. The deprecation is about elliptic.Curve as a
# verification interface; migrating to btcec's typed API touches signature
# verification and warrants its own change with focused test coverage.
version: "2"

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
  exclusions:
    generated: lax
    # Idiomatic errcheck cases (deferred Close, response Write/Print, …).
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Test setup intentionally ignores errors.
      - path: _test\.go
        linters:
          - errcheck
      # TEMP (nubecita-3zgt): secp256k1.S256() is deprecated but functional;
      # migrating to the typed btcec API touches DID signature verification.
      - path: internal/did/resolver\.go
        linters:
          - staticcheck
        text: "SA1019.*secp256k1\\.S256"
