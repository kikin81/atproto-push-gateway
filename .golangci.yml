# golangci-lint v2 — TEMPORARY BASELINE (tracked in bead nubecita-3zgt).
#
# Only linters that are clean (govet) or fully grandfathered (errcheck) on the
# inherited DracoBlue code are enabled, so CI is green on adoption while still
# linting new code. staticcheck (its SA bug checks + ST style + QF quick-fixes),
# unused, and the formatters surface many findings in the existing code AND
# auto-rewrite it (golangci-lint --fix), so they're deferred. Re-enable them one
# at a time on a Go-equipped machine as the code is cleaned, then drop the
# matching exclusions below — end state is the v2 default linter set with empty
# exclusions.
version: "2"

linters:
  default: none
  enable:
    - govet
    - errcheck
  exclusions:
    generated: lax
    # Idiomatic errcheck cases (deferred Close, response Write/Print, …).
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Test setup intentionally ignores errors.
      - path: _test\.go
        linters:
          - errcheck
      # TEMP (nubecita-3zgt): grandfather pre-existing errcheck debt in the
      # inherited source. Remove a path here as its swallowed errors are handled.
      - path: internal/(jetstream/consumer|store/store|push/apns|push/fcm|xrpc/handler|xrpc/blocks|did/resolver|profile/resolver)\.go
        linters:
          - errcheck
