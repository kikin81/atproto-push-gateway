# Mirrors the open-turo Go-service convention (e.g. turo/safe-drop-table,
# turo/schema-migration), run in CI via open-turo/actions-go/lint. The Go hooks
# come from turo/pre-commit-hooks; golangci-lint runs on its defaults (no
# .golangci.yml yet — add one to tune once the first run is green).
default_stages: [pre-commit]
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-json
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        # CHANGELOG.md is regenerated by release-please (unformatted); leaving it
        # to prettier would make release PRs fail this lint job.
        exclude: ^CHANGELOG\.md$
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.24.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@open-turo/commitlint-config-conventional"]
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
  - repo: https://github.com/turo/pre-commit-hooks
    rev: v4.1.0
    hooks:
      - id: go-mod-tidy
      - id: go-build
      - id: docker-lint
      - id: docker-compose-lint
  # Official golangci-lint hook (self-contained: builds itself via the Go from
  # .go-version). Used instead of turo/pre-commit-hooks' golangci-lint, which is
  # a thin wrapper expecting the binary already on PATH (action-setup-tools
  # installs Go but not golangci-lint). Mirrors tagoro9/fotingo.
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.12.2
    hooks:
      - id: golangci-lint-full
  - repo: https://github.com/jumanjihouse/pre-commit-hooks
    rev: 3.0.0
    hooks:
      - id: shellcheck
      - id: shfmt
